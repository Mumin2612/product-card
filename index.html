<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <title>Product Card</title>

</head>
<body>
 <section class="product-section">
  <div class="product-background"></div>
    <div class="product-cards">
      <button class="product-section__toggle">АКТИВНО</button>
      <button class="product-section__action-all">Перекрасить все карточки</button> 
      <button class="product-section__reset">Сброс цветов</button>
      <h1 class="js-title title">Выбери свой продукт</h1>
    </div>

    <div class="product-container"></div>

    <template id="card-template">
      <div class="product-card__content">
        <button class="product-card__action">Перекрасить фон нижней карточки</button>
        <div class="product-card__inner">
        <img class="product-card__image" src="" alt="">
        <p class="product-card__subtitle"></p>
        <h2 class="product-card__title"></h2>
        <p class="product-card__description"></p>          
        <div class="product-card__box">
          <span class="product-card__composition">Состав:</span>  
          <ul class="product-card__composition-list"></ul>
        </div>
          <div class="product-card__price"> 
            <p class="product-card__price-text">Цена</p>
            <p class="product-card__price-value"></p>
          </div>
        </div>
      </div>
    </template>  
  </section>

  <script src="main.js"></script>
  <script src="homework-5.js"></script>
  <script src="homework-6.js"></script>
  <script type="module" src="homework-7.js"></script>
  <script type="module" src="comments.js"></script>
  <script type="module" src="homework-8.js"></script>
</body>
</html>
